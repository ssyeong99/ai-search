.tab-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:center;}

}

<script>
/* ══════════════════════════════════════════
   공통 유틸리티
══════════════════════════════════════════ */
let _toastTimer = null;
function showToast(msg, type='info'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='success'?'#16a34a':type==='error'?'#dc2626':'#1e293b';
  t.classList.remove('show');
  requestAnimationFrame(()=>t.classList.add('show'));
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
function switchTab(tab){
  document.getElementById('sec-grid').classList.toggle('hidden', tab!=='grid');
  document.getElementById('sec-tree').classList.toggle('hidden', tab!=='tree');
  document.getElementById('tab-grid').classList.toggle('active', tab==='grid');
  document.getElementById('tab-tree').classList.toggle('active', tab==='tree');
  if(tab==='tree' && treeNodes.length===0) genTree();
}

/* ══════════════════════════════════════════
   Canvas 트리 렌더러 (vis-network 대체)
══════════════════════════════════════════ */
class TreeCanvas {
  constructor(canvasId){
    this.cv = document.getElementById(canvasId);
    this.ctx = this.cv.getContext('2d');
    this.nodes = []; // {id, x, y, label, color, border}
    this.edges = []; // {from, to}
    this.camX=0; this.camY=0; this.scale=1;
    this._drag=false; this._lx=0; this._ly=0;
    this._initEvents();
    this._resize();
    window.addEventListener('resize', ()=>this._resize());
  }
  _resize(){
    const wrap = this.cv.parentElement;
    this.cv.width  = wrap.clientWidth  || 500;
    this.cv.height = wrap.clientHeight || 420;
    this.draw();
  }
  _initEvents(){
    this.cv.addEventListener('mousedown', e=>{ this._drag=true; this._lx=e.clientX; this._ly=e.clientY; });
    this.cv.addEventListener('mousemove', e=>{
      if(!this._drag) return;
      this.camX += e.clientX-this._lx; this.camY += e.clientY-this._ly;
      this._lx=e.clientX; this._ly=e.clientY; this.draw();
    });
    this.cv.addEventListener('mouseup',   ()=>this._drag=false);
    this.cv.addEventListener('mouseleave',()=>this._drag=false);
    this.cv.addEventListener('wheel', e=>{
      e.preventDefault();
      const f = e.deltaY<0?1.12:0.9;
      const rect=this.cv.getBoundingClientRect();
      const mx=e.clientX-rect.left, my=e.clientY-rect.top;
      this.camX = mx - (mx-this.camX)*f;
      this.camY = my - (my-this.camY)*f;
      this.scale *= f; this.draw();
    },{passive:false});
  }
  clear(){ this.nodes=[]; this.edges=[]; this.camX=0; this.camY=0; this.scale=1; this.draw(); }
  setData(nodes, edges){ this.nodes=nodes; this.edges=edges; this.fitAll(); }
  updateNode(id, props){ const n=this.nodes.find(n=>n.id===id); if(n) Object.assign(n,props); this.draw(); }
  fitAll(){
    if(!this.nodes.length) return;
    const xs=this.nodes.map(n=>n.x), ys=this.nodes.map(n=>n.y);
    const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
    const W=this.cv.width, H=this.cv.height;
    const pad=48;
    const sx=(W-pad*2)/(maxX-minX||1), sy=(H-pad*2)/(maxY-minY||1);
    this.scale=Math.min(sx,sy,1.6);
    this.camX = W/2 - (minX+maxX)/2*this.scale;
    this.camY = pad - minY*this.scale;
    this.draw();
  }
  draw(){
    const {ctx,cv,scale,camX,camY}=this;
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.save(); ctx.translate(camX,camY); ctx.scale(scale,scale);
    // edges
    this.edges.forEach(e=>{
      const a=this.nodes.find(n=>n.id===e.from), b=this.nodes.find(n=>n.id===e.to);
      if(!a||!b) return;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=2/scale; ctx.stroke();
    });
    // nodes
    const R=22;
    this.nodes.forEach(n=>{
      ctx.beginPath(); ctx.arc(n.x,n.y,R,0,Math.PI*2);
      ctx.fillStyle=n.color||'#6366f1'; ctx.fill();
      ctx.strokeStyle=n.border||'#4f46e5'; ctx.lineWidth=2.5/scale; ctx.stroke();
      ctx.fillStyle=n.textColor||'#fff';
      ctx.font=`bold ${14/scale}px Pretendard,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(n.label),n.x,n.y);
    });
    ctx.restore();
  }
  // 클릭한 노드 id 반환
  hitTest(ex, ey){
    const rect=this.cv.getBoundingClientRect();
    const mx=(ex-rect.left-this.camX)/this.scale, my=(ey-rect.top-this.camY)/this.scale;
    const R=22;
    for(const n of this.nodes) if(Math.hypot(n.x-mx,n.y-my)<R+4) return n.id;
    return null;
  }
}

/* ── 계층적 레이아웃 계산 ── */
function layoutTree(adj, rootId){
  // BFS로 레벨 계산
  const level={}, children={};
  const queue=[rootId]; level[rootId]=0;
  const order=[];
  while(queue.length){
    const n=queue.shift(); order.push(n);
    children[n]=adj[n]||[];
    children[n].forEach(c=>{ if(level[c]===undefined){ level[c]=level[n]+1; queue.push(c); } });
  }
  // 각 레벨 노드 수집
  const byLevel={};
  order.forEach(n=>{ (byLevel[level[n]]||(byLevel[level[n]]=[])).push(n); });
  const positions={};
  const HGAP=70, VGAP=90;
  Object.entries(byLevel).forEach(([lv,nodes])=>{
    const total=(nodes.length-1)*HGAP;
    nodes.forEach((n,i)=>{ positions[n]={x:i*HGAP-total/2, y:parseInt(lv)*VGAP}; });
  });
  return positions;
}

/* ══════════════════════════════════════════
   2D 미로 탐색 (Grid)
══════════════════════════════════════════ */
const ROWS=10, COLS=10;
let gridCells=[], gridState=[];
let gridStart={r:1,c:1}, gridEnd={r:8,c:8};
let currentTool='wall', isDrawing=false;
let gridGen=null, gridPlaying=false, gridTimer=null;
let gridCam='fit';

const gridTC = new TreeCanvas('tree-canvas-grid');

function initGrid(){
  const cont=document.getElementById('grid-container');
  cont.style.gridTemplateColumns=`repeat(${COLS},38px)`;
  cont.style.gridTemplateRows=`repeat(${ROWS},38px)`;
  cont.innerHTML=''; gridCells=[]; gridState=[];
  for(let r=0;r<ROWS;r++){
    const rC=[],rS=[];
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='grid-cell'; cell.dataset.r=r; cell.dataset.c=c;
      cell.addEventListener('mousedown',e=>{isDrawing=true;applyTool(e.currentTarget);});
      cell.addEventListener('mouseenter',e=>{if(!isDrawing)return;if(currentTool==='start'||currentTool==='end')return;applyTool(e.currentTarget);});
      cont.appendChild(cell); rC.push(cell); rS.push(0);
    }
    gridCells.push(rC); gridState.push(rS);
  }
  document.onmouseup=()=>isDrawing=false;
  // 도구 버튼
  document.querySelectorAll('.tool-btn').forEach(b=>{
    b.addEventListener('click',e=>{
      document.querySelectorAll('.tool-btn').forEach(x=>x.classList.remove('active'));
      e.currentTarget.classList.add('active');
      currentTool=e.currentTarget.dataset.tool;
    });
  });
  gridUpdateVisuals();
  gridTC._resize();
}

function applyTool(cell){
  gridClearSearch();
  const r=+cell.dataset.r, c=+cell.dataset.c;
  if(currentTool==='start'){if(r===gridEnd.r&&c===gridEnd.c)return;gridStart={r,c};gridState[r][c]=0;}
  else if(currentTool==='end'){if(r===gridStart.r&&c===gridStart.c)return;gridEnd={r,c};gridState[r][c]=0;}
  else if(currentTool==='wall'){if((r===gridStart.r&&c===gridStart.c)||(r===gridEnd.r&&c===gridEnd.c))return;gridState[r][c]=1;}
  else if(currentTool==='eraser'){gridState[r][c]=0;}
  gridUpdateVisuals();
}

function gridUpdateVisuals(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=gridCells[r][c]; cell.className='grid-cell'; cell.innerHTML='';
    if(r===gridStart.r&&c===gridStart.c){cell.classList.add('cell-start');cell.innerHTML='●';}
    else if(r===gridEnd.r&&c===gridEnd.c){cell.classList.add('cell-end');cell.innerHTML='⚑';}
    else if(gridState[r][c]===1) cell.classList.add('cell-wall');
  }
}

function gridClearSearch(){
  if(gridPlaying) gridStopPlay();
  gridGen=null; gridPlaying=false;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    gridCells[r][c].classList.remove('cell-discovered','cell-visited','cell-path');
    const isS=(r===gridStart.r&&c===gridStart.c), isE=(r===gridEnd.r&&c===gridEnd.c);
    if(!isS&&!isE) gridCells[r][c].innerHTML='';
  }
  gridTC.clear();
  setStatus('grid-status','대기 중','');
}

function gridReset(){ gridClearSearch(); }
function gridClearWalls(){
  gridClearSearch();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) gridState[r][c]=0;
  gridUpdateVisuals();
}

function* makeGridGen(algo){
  let tid=0;
  const isBFS=algo==='bfs';
  const visited=Array(ROWS).fill(0).map(()=>Array(COLS).fill(false));
  const inStack=Array(ROWS).fill(0).map(()=>Array(COLS).fill(false));
  const parent=Array(ROWS).fill(0).map(()=>Array(COLS).fill(null));
  const dr=[-1,0,1,0],dc=[0,1,0,-1];
  const startId=tid++;
  const q=[{r:gridStart.r,c:gridStart.c,tid:startId,ptid:null}];
  if(isBFS) visited[gridStart.r][gridStart.c]=true;
  else inStack[gridStart.r][gridStart.c]=true;
  yield {type:'node',r:gridStart.r,c:gridStart.c,tid:startId,ptid:null,label:'S',col:'#10b981'};
  let found=false;
  while(q.length){
    const cur=isBFS?q.shift():q.pop();
    if(!isBFS){
      if(visited[cur.r][cur.c]) continue;
      visited[cur.r][cur.c]=true;
      if(cur.ptid!==null) parent[cur.r][cur.c]={r:cur.pr,c:cur.pc};
    }
    yield {type:'visit',r:cur.r,c:cur.c,tid:cur.tid};
    if(cur.r===gridEnd.r&&cur.c===gridEnd.c){found=true;break;}
    const order=isBFS?[0,1,2,3]:[3,2,1,0];
    for(const i of order){
      const nr=cur.r+dr[i],nc=cur.c+dc[i];
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS||gridState[nr][nc]===1) continue;
      if(isBFS&&visited[nr][nc]) continue;
      if(!isBFS&&(inStack[nr][nc]||visited[nr][nc])) continue;
      const nid=tid++;
      if(!isBFS) inStack[nr][nc]=true;
      else {visited[nr][nc]=true; parent[nr][nc]={r:cur.r,c:cur.c};}
      const lbl=(nr===gridEnd.r&&nc===gridEnd.c)?'E':`${nr},${nc}`;
      yield {type:'node',r:nr,c:nc,tid:nid,ptid:cur.tid,pr:cur.r,pc:cur.c,label:lbl,col:'#bae6fd'};
      q.push({r:nr,c:nc,tid:nid,ptid:cur.tid,pr:cur.r,pc:cur.c});
    }
  }
  if(found){
    let p=[], cur={r:gridEnd.r,c:gridEnd.c};
    while(cur){p.push(cur);const x=parent[cur.r][cur.c];cur=x?{r:x.r,c:x.c}:null;}
    p.reverse();
    for(const n of p) yield {type:'path',r:n.r,c:n.c};
    return true;
  }
  return false;
}

// 그리드 트리 노드 리스트 (Canvas용)
let gtNodes=[], gtEdges=[], gtAdj={};

function gridProcessStep(){
  if(!gridGen){ gridGen=makeGridGen(document.getElementById('grid-algo').value); gtNodes=[]; gtEdges=[]; gtAdj={}; gridPlaying=true; setStatus('grid-status','탐색 중...','running'); }
  const res=gridGen.next();
  if(res.done){
    gridStopPlay(); gridPlaying=false;
    setStatus('grid-status', res.value?'목표 도달! 🎉':'경로 없음', res.value?'done':'fail');
    if(res.value) showToast('경로를 찾았습니다!','success');
    else showToast('경로를 찾지 못했습니다.','error');
    return;
  }
  const {type,r,c,tid,ptid,label,col}=res.value;
  const isS=(r===gridStart.r&&c===gridStart.c), isE=(r===gridEnd.r&&c===gridEnd.c);
  if(type==='node'){
    if(!isS&&!isE) gridCells[r][c].classList.add('cell-discovered');
    const pos=computeGridNodePos(tid,ptid);
    gtNodes.push({id:tid,x:pos.x,y:pos.y,label,color:col==='#bae6fd'?'#38bdf8':col,border:'#0284c7',textColor:col==='#10b981'?'#fff':'#0f172a'});
    if(ptid!==null) gtEdges.push({from:ptid,to:tid});
    gtAdj[ptid]=(gtAdj[ptid]||0)+1;
    gridTC.setData(gtNodes,gtEdges);
    if(gridCam==='track') gridTC.scale=1; // handled in fitAll
  } else if(type==='visit'){
    if(!isS&&!isE) gridCells[r][c].classList.add('cell-visited');
    const n=gtNodes.find(n=>n.id===tid);
    if(n){n.color='#3b82f6';n.border='#1d4ed8';n.textColor='#fff';gridTC.draw();}
  } else if(type==='path'){
    if(!isS&&!isE){gridCells[r][c].classList.add('cell-path');gridCells[r][c].innerHTML='★';}
    const n=gtNodes.find(n=>n.label===`${r},${c}`||(r===gridEnd.r&&c===gridEnd.c&&n.label==='E')||(r===gridStart.r&&c===gridStart.c&&n.label==='S'));
    if(n){n.color='#f59e0b';n.border='#b45309';n.textColor='#fff';gridTC.draw();}
  }
}

// 트리 노드 위치: 간단한 레벨+sibling 배치
let _gtLevel={}, _gtSibIdx={};
function computeGridNodePos(tid,ptid){
  if(ptid===null){ _gtLevel[tid]=0; _gtSibIdx[tid]=0; return {x:0,y:0}; }
  const lv=(_gtLevel[ptid]||0)+1; _gtLevel[tid]=lv;
  const sibCount=gtAdj[ptid]||0;
  const idx=sibCount;
  const H=72, W=60;
  const parentNode=gtNodes.find(n=>n.id===ptid);
  const px=parentNode?parentNode.x:0;
  const x=px+(idx)*W - (gtAdj[ptid]||0)*W/2;
  return {x, y:lv*H};
}

function setGridCam(mode){
  gridCam=mode;
  if(mode==='fit') gridTC.fitAll();
}

function gridStep(){
  if(gridPlaying&&gridTimer){ gridStopPlay(); return; }
  gridProcessStep();
}
function gridTogglePlay(){
  if(gridPlaying&&gridTimer){ gridStopPlay(); return; }
  if(!gridPlaying&&gridGen&&gridGen.next===undefined) return;
  const btn=document.getElementById('grid-play-btn');
  btn.innerHTML='⏸일시정지';
  btn.classList.add('btn-pause'); btn.classList.remove('btn-primary');
  function loop(){
    gridProcessStep();
    if(gridPlaying&&gridGen){
      const spd=1000-parseInt(document.getElementById('grid-speed').value)+50;
      gridTimer=setTimeout(loop,spd);
    }
  }
  loop();
}
function gridStopPlay(){
  clearTimeout(gridTimer); gridTimer=null;
  const btn=document.getElementById('grid-play-btn');
  btn.innerHTML='▶자동';
  btn.classList.remove('btn-pause'); btn.classList.add('btn-primary');
}
function setStatus(id,text,cls){
  const el=document.getElementById(id);
  el.textContent=text;
  el.className='status-badge'+(cls?' '+cls:'');
}

/* ══════════════════════════════════════════
   트리 탐색 (Tree)
══════════════════════════════════════════ */
let treeNodes=[], treeEdges=[], treeAdj={};
let treeGoal=null, treeSearchSt=null, treePlaying=false, treeTimer=null;
const treeTC = new TreeCanvas('tree-canvas-tree');

treeTC.cv.addEventListener('click', e=>{
  const id=treeTC.hitTest(e.clientX,e.clientY);
  if(id!==null){
    if(treeSearchSt&&treeSearchSt.status!=='idle'){showToast('탐색 중에는 변경할 수 없습니다.','error');return;}
    setTreeGoal(id);
  }
});

function genTree(){
  treeReset();
  const maxD=Math.min(Math.max(parseInt(document.getElementById('tree-depth').value)||3,2),5);
  const maxC=Math.min(Math.max(parseInt(document.getElementById('tree-children').value)||2,1),4);
  let id=1; treeNodes=[]; treeEdges=[]; treeAdj={};
  treeNodes.push({id:1,label:'1',color:'#6366f1',border:'#4338ca',textColor:'#fff'});
  treeAdj[1]=[];
  function build(pid,depth){
    if(depth>maxD||id>=120) return;
    const nc=Math.floor(Math.random()*maxC)+1;
    for(let i=0;i<nc;i++){
      if(id>=120) return;
      id++;
      treeNodes.push({id,label:String(id),color:'#6366f1',border:'#4338ca',textColor:'#fff'});
      treeEdges.push({from:pid,to:id});
      treeAdj[pid].push(id); treeAdj[id]=[];
      build(id,depth+1);
    }
  }
  build(1,1);
  // 레이아웃 계산
  const adj={}; treeNodes.forEach(n=>adj[n.id]=treeAdj[n.id]||[]);
  const pos=layoutTree(adj,1);
  treeNodes.forEach(n=>{ n.x=pos[n.id]?.x||0; n.y=pos[n.id]?.y||0; });
  // 목표 랜덤 설정
  const ids=treeNodes.map(n=>n.id);
  setTreeGoal(ids[Math.floor(Math.random()*(ids.length-1))+1]);
  treeTC.setData([...treeNodes],[...treeEdges]);
}

function setTreeGoal(id){
  if(treeGoal!==null){
    const old=treeNodes.find(n=>n.id===treeGoal);
    if(old){old.color='#6366f1';old.border='#4338ca';}
  }
  treeGoal=id;
  const n=treeNodes.find(n=>n.id===id);
  if(n){n.color='#ef4444';n.border='#b91c1c';}
  treeTC.draw();
  showToast(`노드 [${id}]가 목표로 지정되었습니다.`,'success');
}

function treeInitSearch(){
  const algo=document.getElementById('tree-algo').value;
  treeSearchSt={algo,ds:[1],visited:new Set([1]),status:'running',cur:null};
  setStatus('tree-status','탐색 중...','running');
}

function treeStepCore(){
  if(!treeSearchSt) treeInitSearch();
  if(treeSearchSt.status!=='running') return false;
  const st=treeSearchSt;
  if(st.cur!==null&&st.cur!==treeGoal){
    const n=treeNodes.find(n=>n.id===st.cur);
    if(n){n.color='#94a3b8';n.border='#64748b';n.textColor='#fff';}
  }
  if(!st.ds.length){
    st.status='done';
    setStatus('tree-status','목표를 찾지 못했습니다.','fail');
    showToast('모든 노드를 탐색했습니다.','error');
    treeTC.draw(); return false;
  }
  const cur=st.algo==='bfs'?st.ds.shift():st.ds.pop();
  st.cur=cur;
  if(cur===treeGoal){
    st.status='done';
    setStatus('tree-status','🎉 목표 발견!','done');
    const n=treeNodes.find(n=>n.id===cur);
    if(n){n.color='#22c55e';n.border='#15803d';}
    showToast(`목표 노드 [${cur}]를 찾았습니다!`,'success');
    treeTC.draw(); return false;
  }
  const n=treeNodes.find(n=>n.id===cur);
  if(n){n.color='#eab308';n.border='#a16207';}
  const ch=treeAdj[cur]||[];
  const order=st.algo==='dfs'?[...ch].reverse():ch;
  order.forEach(c=>{ if(!st.visited.has(c)){st.visited.add(c);st.ds.push(c);} });
  treeTC.draw(); return true;
}

function treeStep(){ if(treePlaying) treeStopPlay(); treeStepCore(); }
function treeTogglePlay(){ treePlaying?treeStopPlay():treeStartPlay(); }
function treeStartPlay(){
  if(treeSearchSt&&treeSearchSt.status==='done') treeReset();
  treePlaying=true;
  const btn=document.getElementById('tree-play-btn');
  btn.innerHTML='⏸일시정지';
  btn.classList.add('btn-pause'); btn.classList.remove('btn-primary');
  function loop(){
    const has=treeStepCore();
    if(has&&treePlaying){
      const spd=1000-parseInt(document.getElementById('tree-speed').value)+50;
      treeTimer=setTimeout(loop,spd);
    } else treeStopPlay();
  }
  loop();
}
function treeStopPlay(){
  treePlaying=false; clearTimeout(treeTimer);
  const btn=document.getElementById('tree-play-btn');
  btn.innerHTML='▶자동';
  btn.classList.remove('btn-pause'); btn.classList.add('btn-primary');
}
function treeReset(){
  treeStopPlay(); treeSearchSt=null;
  setStatus('tree-status','대기 중','');
  treeNodes.forEach(n=>{
    n.color=n.id===treeGoal?'#ef4444':'#6366f1';
    n.border=n.id===treeGoal?'#b91c1c':'#4338ca';
    n.textColor='#fff';
  });
  treeTC.draw();
}

/* ══════════════════════════════════════════
   초기화
══════════════════════════════════════════ */
window.onload = ()=>{ initGrid(); };
</script>
